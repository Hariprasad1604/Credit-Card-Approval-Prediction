<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Credit Card Approval Prediction</title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <div class="card">

        <h1>💳 Credit Card Approval Prediction</h1>

        <p class="subtitle">
            Enter the applicant details below to predict
            whether the credit card application is likely
            to be approved.
        </p>

        <form action="/predict" method="POST">

            <div class="grid">

                <!-- Gender -->

                <div class="input-group">

                    <label>Gender</label>

                    <select
                        name="CODE_GENDER"
                        required>

                        <option value="">Select</option>

                        <option value="M">
                            Male
                        </option>

                        <option value="F">
                            Female
                        </option>

                    </select>

                </div>

                <!-- Own Car -->

                <div class="input-group">

                    <label>Own Car</label>

                    <select
                        name="FLAG_OWN_CAR"
                        required>

                        <option value="Y">
                            Yes
                        </option>

                        <option value="N">
                            No
                        </option>

                    </select>

                </div>

                <!-- Own House -->

                <div class="input-group">

                    <label>Own House</label>

                    <select
                        name="FLAG_OWN_REALTY"
                        required>

                        <option value="Y">
                            Yes
                        </option>

                        <option value="N">
                            No
                        </option>

                    </select>

                </div>

                <!-- Children -->

                <div class="input-group">

                    <label>Children</label>

                    <input
                        type="number"
                        name="CNT_CHILDREN"
                        min="0"
                        required>

                </div>

                <!-- Annual Income -->

                <div class="input-group">

                    <label>Annual Income</label>

                    <input
                        type="number"
                        name="AMT_INCOME_TOTAL"
                        min="0"
                        required>

                </div>

                <!-- Work Phone -->

                <div class="input-group">

                    <label>Work Phone</label>

                    <select
                        name="FLAG_WORK_PHONE">

                        <option value="1">
                            Yes
                        </option>

                        <option value="0">
                            No
                        </option>

                    </select>

                </div>

                <!-- Phone -->

                <div class="input-group">

                    <label>Phone</label>

                    <select
                        name="FLAG_PHONE">

                        <option value="1">
                            Yes
                        </option>

                        <option value="0">
                            No
                        </option>

                    </select>

                </div>

                <!-- Email -->

                <div class="input-group">

                    <label>Email</label>

                    <select
                        name="FLAG_EMAIL">

                        <option value="1">
                            Yes
                        </option>

                        <option value="0">
                            No
                        </option>

                    </select>

                </div>

                <!-- Family Members -->

                <div class="input-group">

                    <label>Family Members</label>

                    <input
                        type="number"
                        step="0.1"
                        name="CNT_FAM_MEMBERS"
                        required>

                </div>

                <!-- Age -->

                <div class="input-group">

                    <label>Age</label>

                    <input
                        type="number"
                        name="Age"
                        min="18"
                        required>

                </div>

                <!-- Employment -->

                <div class="input-group">

                    <label>Employment Years</label>

                    <input
                        type="number"
                        step="0.1"
                        name="Employment_Years"
                        required>

                </div>
                                <!-- Income Type -->

                <div class="input-group">

                    <label>Income Type</label>

                    <select
                        name="NAME_INCOME_TYPE"
                        required>

                        <option value="Working">Working</option>

                        <option value="Commercial associate">
                            Commercial Associate
                        </option>

                        <option value="Pensioner">
                            Pensioner
                        </option>

                        <option value="State servant">
                            State Servant
                        </option>

                        <option value="Student">
                            Student
                        </option>

                    </select>

                </div>

                <!-- Education -->

                <div class="input-group">

                    <label>Education</label>

                    <select
                        name="NAME_EDUCATION_TYPE"
                        required>

                        <option value="Secondary / secondary special">
                            Secondary / Secondary Special
                        </option>

                        <option value="Higher education">
                            Higher Education
                        </option>

                        <option value="Incomplete higher">
                            Incomplete Higher
                        </option>

                        <option value="Lower secondary">
                            Lower Secondary
                        </option>

                        <option value="Academic degree">
                            Academic Degree
                        </option>

                    </select>

                </div>

                <!-- Family Status -->

                <div class="input-group">

                    <label>Family Status</label>

                    <select
                        name="NAME_FAMILY_STATUS"
                        required>

                        <option value="Married">
                            Married
                        </option>

                        <option value="Single / not married">
                            Single
                        </option>

                        <option value="Civil marriage">
                            Civil Marriage
                        </option>

                        <option value="Separated">
                            Separated
                        </option>

                        <option value="Widow">
                            Widow
                        </option>

                    </select>

                </div>

                <!-- Housing -->

                <div class="input-group">

                    <label>Housing Type</label>

                    <select
                        name="NAME_HOUSING_TYPE"
                        required>

                        <option value="House / apartment">
                            House / Apartment
                        </option>

                        <option value="Rented apartment">
                            Rented Apartment
                        </option>

                        <option value="Municipal apartment">
                            Municipal Apartment
                        </option>

                        <option value="Office apartment">
                            Office Apartment
                        </option>

                        <option value="With parents">
                            With Parents
                        </option>

                        <option value="Co-op apartment">
                            Co-op Apartment
                        </option>

                    </select>

                </div>

                <!-- Occupation -->

                
                <div class="input-group">

    <label>Occupation</label>

    <select name="OCCUPATION_TYPE" required>

        <option value="">Select Occupation</option>

        <option value="Unknown">Unknown</option>
        <option value="Managers">Managers</option>
        <option value="Core staff">Core Staff</option>
        <option value="Laborers">Laborers</option>
        <option value="High skill tech staff">High Skill Tech Staff</option>
        <option value="Medicine staff">Medicine Staff</option>
        <option value="Drivers">Drivers</option>
        <option value="Sales staff">Sales Staff</option>
        <option value="Cleaning staff">Cleaning Staff</option>
        <option value="Cooking staff">Cooking Staff</option>
        <option value="Security staff">Security Staff</option>
        <option value="Private service staff">Private Service Staff</option>
        <option value="Waiters/barmen staff">Waiters/Barmen Staff</option>
        <option value="Low-skill Laborers">Low-Skill Laborers</option>
        <option value="Secretaries">Secretaries</option>
        <option value="HR staff">HR Staff</option>
        <option value="Realty agents">Realty Agents</option>
        <option value="IT staff">IT Staff</option>

    </select>

</div>

                   

            </div>

            <button
                class="predict-btn"
                type="submit">

                Predict Approval

            </button>

        </form>

        {% if prediction %}

        <div class="result-card">

            <h2>{{ prediction }}</h2>

            {% if confidence %}

            <p>

                <strong>Confidence:</strong>

                {{ confidence }}%

            </p>

            {% endif %}

        </div>

        {% endif %}

    </div>

</div>

</body>

</html>
